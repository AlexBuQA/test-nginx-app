<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дипломный проект — Yandex.Cloud DevOps</title>
  <style>
    :root {
      --bg: #0f1226;
      --card: #1a1f3d;
      --accent: #6c7bff;
      --text: #e8eaf6;
      --muted: #9aa0c3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #232a55 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(108,123,255,0.25);
      border-radius: 18px;
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .badge {
      display: inline-block;
      background: rgba(108,123,255,0.15);
      color: var(--accent);
      border: 1px solid rgba(108,123,255,0.4);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }
    h1 { font-size: 28px; margin-bottom: 12px; line-height: 1.3; }
    p { color: var(--muted); font-size: 16px; line-height: 1.6; }
    .version {
      margin-top: 28px;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }
    .footer { margin-top: 24px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">CI/CD • Kubernetes • Yandex.Cloud</span>
    <h1>Тестовое приложение<br>дипломного практикума</h1>
    <p>Статическая страница, которую отдаёт nginx в контейнере,
       развёрнутом в Kubernetes-кластере. Сборка и деплой автоматизированы
       через GitHub Actions.</p>
        <div class="version">Версия приложения: v1.1</div>
    <div class="footer">Автор: Александра Бужор</div>
  </div>
</body>
</html>
